name: Pretalx Sync (devcon8)

on:
  schedule:
    - cron: "0 23 30 * *"
  workflow_dispatch:

# Serialize runs so two syncs can't race to commit the same data files.
concurrency:
  group: pretalx-sync-devcon8
  cancel-in-progress: false

jobs:
  build:
    defaults:
      run:
        working-directory: ./devcon-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
      - run: pnpm install
      - run: pnpm sync:pretalx:devcon8
        env:
          PRETALX_API_KEY_MUMBAI: ${{ secrets.PRETALX_API_KEY_MUMBAI }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_SECRET: ${{ secrets.EMAIL_SECRET }}
      - uses: EndBug/add-and-commit@v9
        with:
          add: "devcon-api/data"
          default_author: github_actions
          message: "[action] Pretalx Sync (devcon8)"
          pull: "--rebase --autostash -X theirs"
      - name: Sync sessions to RAG DB
        working-directory: ./devcon-ai
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pnpm install
          pnpm sync:sessions --event devcon8
