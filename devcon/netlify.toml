[build]
    ignore = "if [ ${COMMIT_REF} == ${CACHED_COMMIT_REF} ] ; then false ; else git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ../devcon ../lib ; fi"
    command = "pnpm run build"
    publish = ".next"

[functions]
  included_files = ["src/content/**/*"]

[[plugins]]
    package = "@netlify/plugin-nextjs"

[[edge_functions]]
  path = "/_next/image/*"
  function = "image-csp"

# Stamp `x-pretix-buyer-ip` (from Netlify edge `context.ip`) into every
# rate-limited API route's request, so `getClientIp` in the Next.js function
# can resolve the real buyer IP regardless of whether the @netlify/plugin-nextjs
# version forwards Netlify's own client-IP headers. See netlify/edge-functions/
# inject-client-ip.ts for details.
[[edge_functions]]
  path = "/api/x402/tickets/purchase/*"
  function = "inject-client-ip"
[[edge_functions]]
  path = "/api/x402/tickets/verify/*"
  function = "inject-client-ip"
[[edge_functions]]
  path = "/api/x402/tickets/fiat-purchase/*"
  function = "inject-client-ip"
[[edge_functions]]
  path = "/api/x402/tickets/validate-voucher/*"
  function = "inject-client-ip"
[[edge_functions]]
  path = "/api/x402/tickets"
  function = "inject-client-ip"
[[edge_functions]]
  path = "/api/tickets/validate-early-access/*"
  function = "inject-client-ip"
# Phase C additions — rate-limited or oracle-sensitive routes that also need
# the edge-stamped IP (Fixes 18, 21, 23, 25). Keep this list in sync with the
# rate-limited route inventory; any new throttled endpoint MUST be added here
# or the M8 trust gate falls back to socket peer for that route.
[[edge_functions]]
  path = "/api/x402/tickets/order-status/*"
  function = "inject-client-ip"
[[edge_functions]]
  path = "/api/tickets/send-voucher-email/*"
  function = "inject-client-ip"
[[edge_functions]]
  path = "/api/tickets/self-voucher/*"
  function = "inject-client-ip"

[[redirects]]
  from = "/grants"
  to = "https://esp.ethereum.foundation/devcon-grants"
  status = 302
  force = true

[[redirects]]
  from = "/speak"
  to = "https://speak.devcon.org/devcon7-sea/cfp"
  status = 302
  force = true

[[redirects]]
  from = "/side-events"
  to = "https://devcon.org/devcon-week"
  status = 302
  force = true

[[redirects]]
  from = "/schedule"
  to = "https://app.devcon.org/schedule"
  status = 302
  force = true

[[redirects]]
  from = "/qr-code/devcon-8-local-early-bird*"
  to = "/en/tickets/store/"
  status = 302
  force = true

[[redirects]]
  from = "/:locale/qr-code/devcon-8-local-early-bird*"
  to = "/en/tickets/store/"
  status = 302
  force = true
